<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" width="100%" height="100%" style="background-color: #0e0f11; font-family: 'JetBrains Mono', 'Fira Code', monospace;">
  <!-- GRID UNDERLAY -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1c1e24" stroke-width="1"/>
    </pattern>
    <pattern id="dot-grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2d3139"/>
    </pattern>
    <linearGradient id="wall-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f242e" />
      <stop offset="100%" stop-color="#11141a" />
    </linearGradient>
  </defs>

  <!-- BACKGROUNDS -->
  <rect width="100%" height="100%" fill="#0a0b0d" />
  <rect width="100%" height="100%" fill="url(#dot-grid)" opacity="0.7"/>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.3"/>

  <!-- TITLE BLOCK (HUD STYLE) -->
  <g transform="translate(30, 40)">
    <line x1="0" y1="0" x2="350" y2="0" stroke="#00f0ff" stroke-width="2" />
    <line x1="350" y1="0" x2="370" y2="20" stroke="#00f0ff" stroke-width="2" />
    <text x="0" y="-12" fill="#00f0ff" font-size="12" font-weight="bold" letter-spacing="1.5">DEAD BELL MAP BLUEPRINT</text>
    <text x="0" y="24" fill="#ffffff" font-size="20" font-weight="900" letter-spacing="1">SURVIVAL ARENA LEVEL: CLASSROOM 101B</text>
    <text x="0" y="44" fill="#a3a3a3" font-size="11" letter-spacing="0.5">SCALE: 1 UNIT = 15PX — ORIENTATION: TOP-DOWN TACTICAL</text>
  </g>

  <!-- ARENA BOUNDS DESIGN & LAYOUT -->
  <!-- 
    Coordinate mapping:
    (X, Z) -> (x_pixel, y_pixel)
    Using scaling center at (280, 315) with factor 15.
    x_pixel = 280 + X * 15
    y_pixel = 315 + Z * 15
  -->

  <!-- SECTOR AREAS OUTLINES (UNDERLAY COVERS) -->
  <!-- Classroom Bounds: x_pixel 70 to 490, y_pixel 135 to 495 -->
  <rect x="70" y="135" width="420" height="360" fill="#14171d" opacity="0.6" stroke="#22c8ff" stroke-width="1" stroke-dasharray="4 4" />
  
  <!-- Hallway Bounds: x_pixel 490 to 640, y_pixel 75 to 555 -->
  <rect x="490" y="75" width="150" height="480" fill="#121d24" opacity="0.4" stroke="#00ffcc" stroke-width="1" stroke-dasharray="4 4" />

  <!-- SECTOR LABELS -->
  <text x="100" y="165" fill="#22c8ff" font-size="14" font-weight="950" opacity="0.8" letter-spacing="2">SECTOR A: CLASSROOM AREA (28m x 24m)</text>
  <text x="510" y="105" fill="#00ffcc" font-size="14" font-weight="950" opacity="0.8" letter-spacing="2" transform="rotate(90, 510, 105)" transform-origin="510 105">SECTOR B: ROTATED CORRIDOR (10m x 32m)</text>

  <!-- CLASSROOM PROPS & ELEMENTS -->
  <!-- Chalkboard at North Wall (Z=-12 => Y=135, centered, width 12 => width 180px) -->
  <rect x="190" y="135" width="180" height="10" fill="#101114" stroke="#a3a3a3" stroke-width="1.5" />
  <rect x="200" y="138" width="160" height="4" fill="#064e3b" />
  <text x="215" y="153" fill="#a3a3a3" font-size="9">CHALKBOARD (NORTH WALL)</text>

  <!-- Teacher's Desk: X=0 => cx=280, Z=-7.5 => cy=202.5. Desk dimensions: width 3.2m => 48px, depth 1.6m => 24px -->
  <rect x="256" y="190" width="48" height="24" rx="2" fill="#3b2314" stroke="#5c3821" stroke-width="1" />
  <text x="259" y="205" fill="#ffffff" font-size="8" font-weight="bold">TEACHER</text>
  <text x="265" y="224" fill="#a3a3a3" font-size="7">DESK PROP</text>

  <!-- Student Desks (Classroom Obstacles) -->
  <!-- Desk rows mapped across space -->
  <!-- Row 1 -->
  <g transform="translate(130, 260)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 1</text>
  </g>
  <g transform="translate(210, 260)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 2</text>
  </g>
  <g transform="translate(290, 260)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 3</text>
  </g>
  <g transform="translate(370, 260)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 4</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(130, 330)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 5</text>
  </g>
  <g transform="translate(210, 330)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 6</text>
  </g>
  <g transform="translate(290, 330)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 7</text>
  </g>
  <g transform="translate(370, 330)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 8</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(130, 400)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="6" y="12" fill="#888c94" font-size="7">DESK 9</text>
  </g>
  <g transform="translate(210, 400)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="4" y="12" fill="#888c94" font-size="7">DESK 10</text>
  </g>
  <g transform="translate(290, 400)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="4" y="12" fill="#888c94" font-size="7">DESK 11</text>
  </g>
  <g transform="translate(370, 400)">
    <rect x="0" y="0" width="30" height="20" rx="1" fill="#2b2d35" stroke="#484b54" />
    <text x="4" y="12" fill="#888c94" font-size="7">DESK 12</text>
  </g>

  <!-- HALLWAY PROPS (METALLIC LOCKERS) -->
  <!-- Located along the east boundary of the hallway (X=23.5 => x_pixel = 632.5) -->
  <g fill="#115e59" stroke="#14b8a6" stroke-width="1">
    <!-- Locker group North -->
    <rect x="620" y="135" width="16" height="35" rx="1" />
    <rect x="620" y="172" width="16" height="35" rx="1" />
    <rect x="620" y="210" width="16" height="35" rx="1" />
    <text x="600" y="195" fill="#14b8a6" font-size="8" transform="rotate(-90, 600, 195)">LOCKERS</text>

    <!-- Locker group South -->
    <rect x="620" y="420" width="16" height="35" rx="1" />
    <rect x="620" y="457" width="16" height="35" rx="1" />
    <text x="600" y="445" fill="#14b8a6" font-size="8" transform="rotate(-90, 600, 445)">LOCKERS</text>
  </g>

  <!-- INTERACTIVE BUYABLE TRIGGERS -->
  <!-- Shotgun WallBuy: West Classroom Wall (X=-14 => x_pixel=70, Z=0 => y_pixel=315) -->
  <g transform="translate(70, 315)">
    <!-- Glowing prompt box -->
    <circle cx="0" cy="0" r="6" fill="#facc15" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <!-- Wall buy bracket outline -->
    <path d="M 0 -15 L 20 -15 L 20 15 L 0 15" fill="none" stroke="#facc15" stroke-width="1.5" />
    <!-- Weapon Text -->
    <text x="25" y="-3" fill="#facc15" font-size="9" font-weight="900">SHOTGUN WALLBUY</text>
    <text x="25" y="8" fill="#eab308" font-size="8">$700 REFILL / BUY</text>
  </g>

  <!-- Buyable Exit Door / Classroom-Hallway Gate (X=14 => x_pixel=490, Z=0 => y_pixel=315) -->
  <g transform="translate(490, 315)">
    <!-- Glowing gate marker -->
    <circle cx="0" cy="0" r="7" fill="#ef4444" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="r" values="6;10;6" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <!-- Double swinging barricade lines (running Z -2 to +2 => Y from 285 to 345) -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#f43f5e" stroke-width="4" stroke-dasharray="6 3" />
    <!-- Indicator banner -->
    <rect x="-115" y="-45" width="110" height="24" rx="2" fill="#1e1b1c" stroke="#ef4444" stroke-width="1" />
    <text x="-110" y="-36" fill="#ef4444" font-size="8" font-weight="900">GATE BARRIER</text>
    <text x="-110" y="-26" fill="#f43f5e" font-size="8">$1200 UNLOCK</text>
    
    <!-- Direction arrow pointing to corridor -->
    <path d="M 12 0 L 25 0 M 21 -4 L 25 0 L 21 4" fill="none" stroke="#00ffcc" stroke-width="1.5" />
  </g>

  <!-- PLAYER START POSITION AND MOTION -->
  <!-- Spawn point: typically centered at X=0, Z=4 (Y = 315 + 60 = 375) -->
  <g transform="translate(280, 375)">
    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.8">
      <animate attributeName="r" values="12;24;12" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <!-- Player icon -->
    <circle cx="0" cy="0" r="8" fill="#22c55e" stroke="#ffffff" stroke-width="1.5" />
    <!-- Cone of sight (green translucent triangle pointing forward/North) -->
    <path d="M 0 0 L -30 -60 L 30 -60 Z" fill="#22c55e" opacity="0.25" />
    <text x="12" y="4" fill="#22c55e" font-size="9" font-weight="bold" letter-spacing="0.5">PLAYER SPAWN</text>
  </g>

  <!-- HARDWARE SOLID ARENA WALLS (THICK CORNER SPECIFICATIONS) -->
  <g fill="url(#wall-grad)" stroke="#2d3139" stroke-width="1.5">
    <!-- CLASSROOM WEST WALL -->
    <rect x="66" y="131" width="8" height="368" />
    <!-- CLASSROOM NORTH WALL -->
    <rect x="66" y="131" width="428" height="8" />
    <!-- CLASSROOM SOUTH WALL -->
    <rect x="66" y="491" width="428" height="8" />
    <!-- CLASSROOM TO HALLWAY BORDER WALL CHUNKS (Separating east side) -->
    <!-- North partition from Y=135 to 285 (Z = -12 to -2) -->
    <rect x="486" y="131" width="8" height="154" />
    <!-- South partition from Y=345 to 495 (Z = 2 to 12) -->
    <rect x="486" y="345" width="8" height="154" />

    <!-- HALLWAY EXTRA ENCAPSULATING CAP WALLS -->
    <!-- Extra west wall North of classroom connection (Y=75 to 135) -->
    <rect x="486" y="71" width="8" height="64" />
    <!-- Extra west wall South of classroom connection (Y=495 to 555) -->
    <rect x="486" y="491" width="8" height="64" />
    <!-- Hallway North end cap -->
    <rect x="486" y="71" width="158" height="8" />
    <!-- Hallway South end cap -->
    <rect x="486" y="551" width="158" height="8" />
    <!-- Hallway East back boundary wall -->
    <rect x="636" y="71" width="8" height="488" />
  </g>

  <!-- LIGHTING ALARM SPOTLIGHT HIGHLIGHTS -->
  <!-- Red halogen flashing alarm light in hallway (X=19, Z=-8) => (315 + 120 = 435, 315 - 120 = 195) -->
  <circle cx="565" cy="195" r="30" fill="#ef4444" opacity="0.08" />
  <circle cx="565" cy="195" r="4" fill="#f87171" stroke="#ef4444" stroke-width="1" />
  
  <!-- Blue emergency beacon spotlight (X=19, Z=8) -->
  <circle cx="565" cy="435" r="30" fill="#38bdf8" opacity="0.08" />
  <circle cx="565" cy="435" r="4" fill="#7dd3fc" stroke="#38bdf8" stroke-width="1" />

  <!-- MOONLIGHT WINDOW EMBEVELLING (NORTH AND SOUTH WALLS) -->
  <!-- Left Window North -->
  <line x1="130" y1="131" x2="160" y2="131" stroke="#38bdf8" stroke-width="2" />
  <!-- Right Window North -->
  <line x1="400" y1="131" x2="430" y2="131" stroke="#38bdf8" stroke-width="2" />
  <!-- Left Window South -->
  <line x1="130" y1="499" x2="160" y2="499" stroke="#38bdf8" stroke-width="2" />
  <!-- Right Window South -->
  <line x1="400" y1="499" x2="430" y2="499" stroke="#38bdf8" stroke-width="2" />

  <!-- DIMENSION LABELS AND GUIDE MARKS -->
  <!-- Classroom width label -->
  <line x1="74" y1="515" x2="482" y2="515" stroke="#22c8ff" stroke-width="1" stroke-dasharray="2 2" />
  <path d="M 74 511 L 74 519 M 482 511 L 482 519" stroke="#22c8ff" stroke-width="1" />
  <text x="250" y="530" fill="#22c8ff" font-size="10" font-weight="bold" text-anchor="middle">28 METERS</text>

  <!-- Classroom depth label -->
  <line x1="45" y1="135" x2="45" y2="495" stroke="#22c8ff" stroke-width="1" stroke-dasharray="2 2" />
  <path d="M 41 135 L 49 135 M 41 495 L 49 495" stroke="#22c8ff" stroke-width="1" />
  <text x="25" y="320" fill="#22c8ff" font-size="10" font-weight="bold" text-anchor="middle" transform="rotate(-90, 25, 320)">24 METERS</text>

  <!-- Hallway depth label -->
  <line x1="662" y1="75" x2="662" y2="555" stroke="#00ffcc" stroke-width="1" stroke-dasharray="2 2" />
  <path d="M 658 75 L 666 75 M 658 555 L 666 555" stroke="#00ffcc" stroke-width="1" />
  <text x="680" y="320" fill="#00ffcc" font-size="10" font-weight="bold" text-anchor="middle" transform="rotate(90, 680, 320)">32 METERS</text>

  <!-- DIAGNOSTICS & LEGEND CONTROLS (HUD SIDEBAR) -->
  <g transform="translate(680, 40)" fill="#a3a3a3" font-size="9">
    <rect x="-10" y="0" width="180" height="470" rx="3" fill="#111317" stroke="#1d2026" stroke-width="1.5" />
    <text x="0" y="22" fill="#ffffff" font-size="11" font-weight="950" letter-spacing="1">ARENA DIRECTORY</text>
    <line x1="0" y1="32" x2="160" y2="32" stroke="#2d3139" stroke-width="1" />

    <!-- Item 1: Player Start -->
    <circle cx="10" cy="55" r="5" fill="#22c55e" stroke="#ffffff" stroke-width="1" />
    <text x="25" y="58" fill="#ffffff" font-weight="bold">PLAYER SPAWN</text>
    <text x="25" y="70" fill="#737373" font-size="8">Central classroom starting spot</text>

    <!-- Item 2: Classroom Door -->
    <rect x="5" y="90" width="10" height="10" fill="#ef4444" />
    <text x="25" y="98" fill="#ffffff" font-weight="bold">BUYABLE GATE ($1200)</text>
    <text x="25" y="110" fill="#737373" font-size="8">Opens Hallway access</text>

    <!-- Item 3: Shotgun WallBuy -->
    <rect x="5" y="130" width="10" height="10" fill="#facc15" />
    <text x="25" y="138" fill="#ffffff" font-weight="bold">SHOTGUN WALLBUY</text>
    <text x="25" y="150" fill="#737373" font-size="8">$700 shotgun item &amp; ammo</text>

    <!-- Item 4: Student Desks -->
    <rect x="5" y="170" width="10" height="10" fill="#2b2d35" stroke="#484b54" />
    <text x="25" y="178" fill="#ffffff" font-weight="bold">CLASSROOM DESKS</text>
    <text x="25" y="190" fill="#737373" font-size="8">Solid path blockers / obstacles</text>

    <!-- Item 5: Lockers -->
    <rect x="5" y="210" width="10" height="10" fill="#115e59" stroke="#14b8a6" />
    <text x="25" y="218" fill="#ffffff" font-weight="bold">METAL LOCKERS</text>
    <text x="25" y="230" fill="#737373" font-size="8">Corridor side barriers</text>

    <!-- Item 6: Window Moonlight -->
    <line x1="5" y1="255" x2="15" y2="255" stroke="#38bdf8" stroke-width="3" />
    <text x="25" y="258" fill="#ffffff" font-weight="bold">WINDOW SHADOWS</text>
    <text x="25" y="270" fill="#737373" font-size="8">Eery moonbeams cast light</text>

    <line x1="0" y1="295" x2="160" y2="295" stroke="#2d3139" stroke-width="1" />
    
    <text x="0" y="315" fill="#a3a3a3" font-size="9" font-weight="bold">ARENA EXTREMES (3D):</text>
    <text x="0" y="333" fill="#8a8a8a" font-size="8">CLASSROOM:</text>
    <text x="10" y="347" fill="#22c8ff" font-family="monospace">W: -14.0 to +14.0</text>
    <text x="10" y="359" fill="#22c8ff" font-family="monospace">D: -12.0 to +12.0</text>
    
    <text x="0" y="380" fill="#8a8a8a" font-size="8">HALLWAY CORRIDOR:</text>
    <text x="10" y="394" fill="#00ffcc" font-family="monospace">W: +14.0 to +24.0</text>
    <text x="10" y="406" fill="#00ffcc" font-family="monospace">D: -16.0 to +16.0</text>

    <!-- Operational status line -->
    <line x1="0" y1="430" x2="160" y2="430" stroke="#22c8ff" opacity="0.3" stroke-width="1" />
    <text x="0" y="448" fill="#00ffcc" font-weight="bold" font-size="8">● MAP ENGINE ACTIVE</text>
    <text x="0" y="458" fill="#60a5fa" font-size="7">SYSTEM BUILD COOP ARENA</text>
  </g>

  <!-- AUDIO FREQUENCY GRAPH (DECORATIVE TECH HUD ELEMENT) -->
  <path d="M 30 580 Q 80 560 130 580 T 230 580 T 330 580 T 430 580 T 530 580 T 630 580" fill="none" stroke="#22c8ff" stroke-width="1.5" opacity="0.4" />
  <path d="M 30 580 Q 80 595 130 580 T 230 580 T 330 580 T 430 580 T 530 580 T 630 580" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.25" />
  <circle cx="330" cy="580" r="3" fill="#22c8ff" />
  <text x="340" y="583" fill="#737373" font-size="7" letter-spacing="1">ZOMBIE SPAWN FREQUENCY PROFILE</text>

  <!-- DECORATIVE CORNER BRACKETS -->
  <path d="M 15 15 L 15 35 M 15 15 L 35 15" fill="none" stroke="#3b4252" stroke-width="2" />
  <path d="M 865 15 L 865 35 M 865 15 L 845 15" fill="none" stroke="#3b4252" stroke-width="2" />
  <path d="M 15 625 L 15 605 M 15 625 L 35 625" fill="none" stroke="#3b4252" stroke-width="2" />
  <path d="M 865 625 L 865 605 M 865 625 L 845 625" fill="none" stroke="#3b4252" stroke-width="2" />
</svg>
