  <!-- DIMENSION GUIDES -->
  <line x1="90" y1="540" x2="454" y2="540" stroke="#22c8ff" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="272" y="554" fill="#22c8ff" font-size="10" font-weight="bold" text-anchor="middle">28 METERS</text>
  <line x1="558" y1="645" x2="766" y2="645" stroke="#fb923c" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="662" y="659" fill="#fb923c" font-size="10" font-weight="bold" text-anchor="middle">16 METERS</text>

  <!-- CORNER BRACKETS -->
  <path d="M 15 15 L 15 35 M 15 15 L 35 15" fill="none" stroke="#3b4252" stroke-width="2"/>
  <path d="M 1165 15 L 1165 35 M 1165 15 L 1145 15" fill="none" stroke="#3b4252" stroke-width="2"/>
  <path d="M 15 765 L 15 745 M 15 765 L 35 765" fill="none" stroke="#3b4252" stroke-width="2"/>
  <path d="M 1165 765 L 1165 745 M 1165 765 L 1145 765" fill="none" stroke="#3b4252" stroke-width="2"/>
</svg>
